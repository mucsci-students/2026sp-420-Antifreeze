<!DOCTYPE html>
<html lang="en">

<head>
  <title>Team Antifreeze: Scheduler GUI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/popup.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/additional_elements.css') }}" />
</head>

<body class="body">
  <div id="wrapper">
    <header>
      <h3 class="team-name">
        <font color="#E84A3F">Te</font><font color="#FFA43F">am</font>
        <!-- This has to be on the same lime or the word is going to be spaced awkwardly -->
        <font color="#FFDF2A">An</font><font color="#2BB971">ti</font><font color="#2EA0D6">fr</font><font color="#956CEE">ee</font><font color="#E93EC3">ze</font>
      </h3>
    </header>
    <nav class="nav-bar">
      <div class="top-bar">
        <button id="load-button">
          <label for="load">Load</label>
          <input id="load" type="file" name="load" accept=".json,.csv" onchange="load_file_content (this);" />
        </button>
        <div class="save-dropdown">
          <button id="save-button">Save</button>
          <div class="dropdown-content">
            <a id="save-json" href="path_to_file" download="proposed_file_name">... as .json</a>
            <a id="save-csv" href="path_to_file" download="proposed_file_name">... as .csv</a>
          </div>
        </div>
      </div>
      <hr />
      <div class="edit-bar">
        <button id="back-button">
          <img src="{{ url_for('static', filename='images/back_shadow.png')}}" alt="Back" />Back
        </button>
        <button id="forward-button">
          <img src="/static/images/forward_shadow.png" alt="Forward" />Forward
        </button>
        <div id="vertical-line"></div>
        <button id="undo-button">
          <img src="/static/images/undo_shadow.png" alt="Undo" />Undo
        </button>
        <button id="redo-button">
          <img src="/static/images/redo_shadow.png" alt="Redo" />Redo
        </button>
        <button id="add-button">
          <img src="/static/images/add_shadow.png" alt="Add" />Add
        </button>
        <button id="modify-button">
          <img src="/static/images/modify_shadow.png" alt="Modify" />Modify
        </button>
        <button id="delete-button">
          <img src="/static/images/delete_shadow.png" alt="Delete" />Delete
        </button>
        <div id="vertical-line"></div>
        <button id="view-button">
          <img src="/static/images/view_shadow.png" alt="View" />View
        </button>
        <button id="print-button">
          <img src="/static/images/print_shadow.png" alt="Print" />Print
        </button>
        <div id="speech">
          <div class="speech-bubble"></div>
        </div>
        <button id="chat-toggle">
          <img src="/static/images/thinking.gif" alt="Chat" />Chat
        </button>
      </div>
      <hr />
      <div class="selection-bar">
        <p>Fields:</p>
        <button id="faculty-button">FACULTY</button>
        <button id="courses-button">COURSES</button>
        <button id="labs-button">LABS</button>
        <button id="rooms-button">ROOMS</button>
        <button id="time-slots-button">TIME SLOTS</button>
        <button id="schedule-button">SCHEDULE</button>
        <div class="sound-toggle">
          <button id="text-to-speech-button">
            <img src="/static/images/no_tts.png" alt="Text to Speech" />
          </button>
          <button id="speech-to-text-button">
            <img src="/static/images/no_stt.png" alt="Speech to Text" />
          </button>
        </div>
      </div>
    </nav>
    <div id="main-container">
      <div id="main-content">
        <main class="main">
          <div id="faculty" class="navigator"></div>
          <div id="courses" class="navigator"></div>
          <div id="labs" class="navigator"></div>
          <div id="rooms" class="navigator"></div>
          <div id="schedule" class="navigator"></div>
          <div id="time-slots" class="navigator"></div>
        </main>
      </div>
      <div id="chat-container">
        <div id="chat-box"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Type a command..." />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
    <footer id="config-name"></footer>
  </div>
  <div id="amd-popup" class="popup-hidden">
    <div class="popup-box">
      <div id="popup-header">
        <p id="popup-title"></p>
        <button id="popup-close">X</button>
      </div>
      <div id="popup-form"></div>
      <div id="popup-footer">
        <button id="popup-save">Save</button>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="/controller/navigation_controller.js" defer></script>
</body>

</html>
